<!DOCTYPE html>
<html>
<head>
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body {
      background-color: orange;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
     .btn-primary {
      background-color: brown;
      border-color: brown;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: rgb(196, 20, 20);
      border-color: rgb(196, 20, 20);
      color: white;
    }

    .btn-secondary {
      background-color: orangered;
      border-color: orangered;
      color: white;
    }
    
    .btn-secondary:hover {
      background-color: rgb(255, 106, 0);
      border-color: rgb(255, 106, 0);
      color: white;
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h2>Depositar</h2>
    <form>
      <div class="form-group">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number" class="form-control" id="depositAmount" placeholder="Enter amount">
      </div>
      <button type="submit" class="btn btn-primary">Realizar depósito</button>
    </form>
    <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
  </div>
</body>
</html>
