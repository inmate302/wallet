<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="container">
    <h2>Depositar</h2>
    <form onsubmit="event.preventDefault(); deposit(Number(document.getElementById('depositAmount').value));">
      <div class="form-group">
        <label for="depositAmount">Monto a depositar:</label>
        <input type="number" class="form-control" id="depositAmount" placeholder="Ingresar monto">
      </div>
      <button type="submit" class="btn btn-primary">Realizar depósito</button>
    </form>
    <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
  </div>
  <script src="./assets/js/balance.js"></script>
</body>
</html>
