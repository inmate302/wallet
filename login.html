<!DOCTYPE html>
<html>
<head>
  <title>Wallet - Login</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body {
      background-color: orange;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    
     .btn-primary {
      background-color: brown;
      border-color: brown;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: rgb(196, 20, 20);
      border-color: rgb(196, 20, 20);
      color: white;
    }

    .btn-secondary {
      background-color: orangered;
      border-color: orangered;
      color: white;
    }
    
    .btn-secondary:hover {
      background-color: rgb(255, 106, 0);
      border-color: rgb(255, 106, 0);
      color: white;
    }

  </style>
</head>
<body>
  <div class="container">
    <h2>Inicio de sesión</h2>
    <form>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Ingrese email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" class="form-control" id="pwd" placeholder="Ingrese contraseña">
      </div>
      <button type="submit" class="btn btn-primary">Iniciar sesión</button>
    </form>
  </div>
<script src="./script.js"></script>
</body>
</html>
