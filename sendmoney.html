<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="container">
    <h2>Enviar Dinero</h2>
    <form class="form">
      <div class="form-group">
        <label for="searchContact">Buscar en la agenda de transferencias:</label>
        <input type="text" class="form-control" id="searchContact" placeholder="Search contact">
      </div>

      <!-- Al hacer click al botón Agregar Contacto se remueve el atributo hidden
           así mostrando el formulario de creación de contacto-->

      <button onclick="document.getElementById('contacto').removeAttribute('hidden'), document.getElementById('cancel').removeAttribute('hidden')" type="button" class="btn btn-primary">Agregar nuevo contacto</button>
      <button id="cancel" type="button" class="btn btn-primary" hidden onclick="document.getElementById('contacto').setAttribute('hidden', ''), document.getElementById('save').setAttribute('hidden', ''), document.getElementById('cancel').setAttribute('hidden', '')">Cancelar</button>
      <div id="contacto" hidden>
        <div id="addcontact">
          <input onchange="event.preventDefault(), document.getElementById('save').removeAttribute('hidden')" type="text" id="fullName" name="fullName" placeholder="Nombre y Apellido">
          <input onchange="event.preventDefault(), document.getElementById('save').removeAttribute('hidden')" type="text" id="account" name="account" placeholder="Cta.Corriente" max="11">
          <input onchange="event.preventDefault(), document.getElementById('save').removeAttribute('hidden')" type="text" id="alias" name="alias" placeholder="Alias">
          <input list="banks" id="bankName" name="bankName" placeholder="Nombre de Banco">
          <datalist id="banks">
            <option value="Banco de Shile"></option>
            <option value="Banco de Pelotillehue"></option>
            <option value="Banco de Talca"></option>
            <option value="Banco de Tiririlquén"></option>
            <option value="Banco Estado"></option>
            <option value="Banco Falabella"></option>
            <option value="Banco Falaferia"></option>
            <option value="Banca Rota"></option>
            <option value="BBVA"></option>
            <option value="La MACH"></option>
            <option value="Prepago Tenpo"></option>
            <option value="Scotiabank-Desarrollo"></option>
            <option value="Tarjeta Líder"></option>
            <option value="Tarjeta PLOP"></option>
            <option value="Tricot Prepago"></option>
          </datalist>
        </div>
      </div>  
      <button onclick="saveContact(), getElementById('contacto').setAttribute('hidden', 'true'), getElementById('save').setAttribute('hidden', 'true')" id="save" class="btn btn-primary" type="button" hidden>Guardar contacto</button>
      <!-- A su vez los elementos input del formulario al ser modificados (onchange) 
           remueven el atributo hidden del botón "guardar contacto" el cuál realiza las validaciones necesarias-->
 <h3>Contactos</h3>
  <ul id="contactList" class="list-group">
  </ul>
    <!-- Anteriormente habían contactos hardcodeados aquí.
         Estos son creados de manera dinámica ahora con la función renderContact -->
    <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
  </form>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
  <script src="./assets/js/sendmoney.js"></script>
  <script src="./assets/js/balance.js"></script>
</body>
</html>
