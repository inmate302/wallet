<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

</head>
<body>
  <div class="container">
    <h2>Menú Principal</h2>
    <div class="form-group">
      <label for="balance">Saldo en cuenta:</label>

    </div>
    <p id="redirectMsg"></p>
    <button href="deposit.html" onclick="setTimeout(() => { alert('Redirigiendo a Depositar'), location.href='deposit.html'; }, 200)" class="btn btn-primary">Depositar</button>
    <button href="sendmoney.html" onclick="setTimeout(() => { alert('Redirigiendo a Enviar Dinero'), location.href='sendmoney.html'; }, 200)" class="btn btn-primary">Enviar Dinero</button>
    <button href="transactions.html" onclick="setTimeout(() => { alert('Redirigiendo a Últimos Movimientos'), location.href='transactions.html'; }, 200)" class="btn btn-primary">Últimos Movimientos</button>
